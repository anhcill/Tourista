<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle - ocean blue gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0D47A1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Globe latitude lines (subtle) -->
  <ellipse cx="32" cy="32" rx="18" ry="18" stroke="rgba(255,255,255,0.25)" stroke-width="0.8" fill="none"/>
  <path d="M14 32 Q32 24 50 32" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" fill="none"/>
  <path d="M14 32 Q32 40 50 32" stroke="rgba(255,255,255,0.2)" stroke-width="0.8" fill="none"/>

  <!-- Location pin (center-left) -->
  <path d="M22 42 C22 37.58 25.58 34 30 34 C34.42 34 38 37.58 38 42 C38 48.42 30 56 30 56 C30 56 22 48.42 22 42Z" fill="url(#pinGrad)" transform="translate(-2, 0) scale(0.8)" transform-origin="32 42"/>

  <!-- Inner white dot (pin center) -->
  <circle cx="28" cy="38" r="3.5" fill="white"/>

  <!-- Compass needle pointing NE (top-right) -->
  <g transform="translate(42, 18) rotate(45)">
    <polygon points="0,-10 3,2 0,0 -3,2" fill="#FF6B35"/>
    <polygon points="0,10 3,-2 0,0 -3,-2" fill="rgba(255,255,255,0.6)"/>
    <circle cx="0" cy="0" r="2" fill="white"/>
  </g>

  <!-- Small plane path (bottom right) -->
  <path d="M44 46 L49 44 L47 47 L50 48 L48 49 L49 52 L46 49 L44 50 Z" fill="rgba(255,255,255,0.85)"/>
</svg>

# ===== CLOUDINARY (Image Upload) =====
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# ===== FILE UPLOAD =====
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  config:
    import: optional:classpath:application.properties,optional:classpath:ai-config.yml

  # ===== DATABASE =====
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tourista}?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&autoReconnect=true&zeroDateTimeBehavior=convertToNull
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP connection pool settings
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000 # 5 minutes
      max-lifetime: 600000 # 10 minutes (must be less than MySQL wait_timeout)
      connection-timeout: 20000 # 20 seconds
      validation-timeout: 5000 # 5 seconds

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none # dùng schema SQL/migration, tránh Hibernate tự ALTER gây lệch FK
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-chat.sql,classpath:schema-articles.sql,classpath:schema-combo.sql

  # ===== EMAIL (SMTP Gmail - local only) =====
  # Railway uses Brevo API instead (see app.email.* below)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:ducanhle28072003@gmail.com}
    password: ${MAIL_PASSWORD:zzwyoiqufiwgyrjq}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ===== GOOGLE OAUTH2 =====
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

# ===== JWT + APP CONFIG =====
app:
  jwt:
    secret: A8kNV8BhXZuHAqvo/Ma7Y47H54ccGKYXJrCfKLJ3apMOk1xnS3/o5HDJYFHjuXPcm5lFgexL9+oCUbPiPMuIig==
    access-token-expiry-ms: 900000 # 15 phút (ms)
    refresh-token-expiry-days: 7 # 7 ngày

  auth:
    max-failed-attempts: 5 # Số lần sai tối đa trước khi khóa
    lock-duration-minutes: 10 # Thời gian khóa (phút)

  rate-limit:
    login-per-minute: 5 # Tối đa 5 lần login / phút / IP
    register-per-minute: 3 # Tối đa 3 lần register / phút / IP

  frontend-url: ${FRONTEND_URL:https://tourista-nine.vercel.app}

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://tourista-nine.vercel.app,http://localhost:3000}

  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:R5V2JO22}
    hash-secret: ${VNPAY_HASH_SECRET:55UIA7VSOA6V3B9HIN2HREEYGUQ7PRFL}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:https://tourista-nine.vercel.app/payments/vnpay/return}

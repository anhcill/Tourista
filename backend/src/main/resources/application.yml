server:
  port: 8080

spring:
  # ===== DATABASE =====
  datasource:
    url: jdbc:mysql://localhost:3306/tourista?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # tự tạo/cập nhật bảng mới (login_attempts, refresh_tokens...)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ===== EMAIL (SMTP Gmail) =====
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ===== GOOGLE OAUTH2 =====
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

# ===== JWT + APP CONFIG =====
app:
  jwt:
    secret: tourista-super-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    access-token-expiry-ms: 900000 # 15 phút (ms)
    refresh-token-expiry-days: 7 # 7 ngày

  auth:
    max-failed-attempts: 5 # Số lần sai tối đa trước khi khóa
    lock-duration-minutes: 10 # Thời gian khóa (phút)

  rate-limit:
    login-per-minute: 5 # Tối đa 5 lần login / phút / IP
    register-per-minute: 3 # Tối đa 3 lần register / phút / IP

  frontend-url: http://localhost:3000 # URL frontend (dùng cho redirect OAuth2, email link)

  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:http://localhost:3000/payments/vnpay/return}
    order-type: other
    locale: vn

logging:
  level:
    # Client aborts on async responses are common (browser refresh/close).
    org.springframework.web.context.request.async: ERROR
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: ERROR

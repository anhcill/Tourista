server:
  port: 8080
  forward-headers-strategy: FRAMEWORK

spring:
  config:
    import: optional:classpath:application.properties

  # ===== DATABASE =====
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tourista}?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&autoReconnect=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP connection pool settings
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000 # 5 minutes
      max-lifetime: 600000 # 10 minutes (must be less than MySQL wait_timeout)
      connection-timeout: 20000 # 20 seconds
      validation-timeout: 5000 # 5 seconds

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none # dùng schema SQL/migration, tránh Hibernate tự ALTER gây lệch FK
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-chat.sql,classpath:schema-articles.sql

  # ===== EMAIL (SMTP Gmail) =====
  mail:
    host: smtp.gmail.com
    port: 587
    username: ducanhle28072003@gmail.com
    password: zzwyoiqufiwgyrjq
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ===== GOOGLE OAUTH2 =====
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

# ===== JWT + APP CONFIG =====
app:
  jwt:
    secret: A8kNV8BhXZuHAqvo/Ma7Y47H54ccGKYXJrCfKLJ3apMOk1xnS3/o5HDJYFHjuXPcm5lFgexL9+oCUbPiPMuIig==
    access-token-expiry-ms: 900000 # 15 phút (ms)
    refresh-token-expiry-days: 7 # 7 ngày

  auth:
    max-failed-attempts: 5 # Số lần sai tối đa trước khi khóa
    lock-duration-minutes: 10 # Thời gian khóa (phút)

  rate-limit:
    login-per-minute: 5 # Tối đa 5 lần login / phút / IP
    register-per-minute: 3 # Tối đa 3 lần register / phút / IP

  frontend-url: http://localhost:3000

  cors:

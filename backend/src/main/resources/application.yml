    brevo-api-key: ${BREVO_API_KEY:}
    from: ${BREVO_FROM_EMAIL:ducanhle28072003@gmail.com}
    from-name: ${BREVO_FROM_NAME:Tourista Studio}

# ===== AI CONFIG =====
# Import từ ai-config.yml - chỉ cần sửa ở đó để đổi model/API key
# (đã import ở spring.config.import bên trên)

# ===== SERVER =====
server:
  port: 8080
  forward-headers-strategy: FRAMEWORK

    hash-secret: 55UIA7VSOA6V3B9HIN2HREEYGUQ7PRFL
    pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    return-url: http://localhost:3000/payments/vnpay/return
    order-type: other

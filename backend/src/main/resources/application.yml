server:
  port: 8080

spring:
  config:
    # Support running from both backend/ and workspace root/.
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties],optional:file:${user.dir}/.env[.properties],optional:file:${user.dir}/backend/.env[.properties]

  # ===== DATABASE =====
  datasource:
    # Priority: explicit DB_* -> SPRING_DATASOURCE_* -> Railway MYSQL* -> local default
    url: ${DB_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:tourista}?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}}
    username: ${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:${MYSQL_ROOT_PASSWORD:}}}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none # dùng schema SQL/migration, tránh Hibernate tự ALTER gây lệch FK
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-chat.sql

  # ===== EMAIL (SMTP Gmail) =====
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ===== GOOGLE OAUTH2 =====
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/api/auth/google/callback"

# ===== JWT + APP CONFIG =====
app:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiry-ms: 900000 # 15 phút (ms)
    refresh-token-expiry-days: 7 # 7 ngày

  auth:
    max-failed-attempts: 5 # Số lần sai tối đa trước khi khóa
    lock-duration-minutes: 10 # Thời gian khóa (phút)

  rate-limit:
    login-per-minute: 5 # Tối đa 5 lần login / phút / IP
    register-per-minute: 3 # Tối đa 3 lần register / phút / IP

  frontend-url: ${FRONTEND_URL:http://localhost:3000} # URL frontend (dùng cho redirect OAuth2, email link)

  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:http://localhost:3000/payments/vnpay/return}
    order-type: other
    locale: vn

logging:
  level:
    # Client aborts on async responses are common (browser refresh/close).
    org.springframework.web.context.request.async: ERROR
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: ERROR

# ===== GEMINI AI =====
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.0-flash
  api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
  timeout-seconds: 10
  max-output-tokens: 400
